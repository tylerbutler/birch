name: Publish

on:
  push:
    tags: ['v*']

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Setup environment
        uses: tylerbutler/actions/setup-gleam@c697a813534c6364a835de8e2ed2c4e0c3638bbe # ratchet:tylerbutler/actions/setup-gleam@main

      - name: Publish to Hex.pm
        # Pipe confirmation for pre-1.0 semver warning (no flag exists to bypass)
        run: echo "I am not using semantic versioning" | gleam publish --yes
        env:
          HEXPM_API_KEY: ${{ secrets.HEXPM_API_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build npm package
        run: gleam run -m talc -- generate

      - name: Publish to npm
        run: npm publish --access public
        working-directory: npm_dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
