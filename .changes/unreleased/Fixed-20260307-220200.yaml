kind: Fixed
body: |-
    Fix `clear_global_config` erasing logger state on Erlang
    The `clear_global_config` function on Erlang was incorrectly erasing both the global config AND the logger state. Now it only clears the config, matching the behavior on JavaScript and preserving the logger instance for continued use.
