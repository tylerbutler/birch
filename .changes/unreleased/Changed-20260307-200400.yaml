kind: Changed
body: |-
    Renamed `get_*` accessors to bare getter style
    All `get_` prefixed accessor functions have been renamed to follow idiomatic Gleam conventions:

    - `logger.get_level()` → `logger.level()`
    - `logger.get_handlers()` → `logger.handlers()`
    - `logger.get_context()` → `logger.context()`
    - `record.get_metadata()` → `record.metadata()`
    - `record.get_caller_id()` → `record.caller_id()`
    - `handler.get_error_callback()` → `handler.error_callback()`
    - `level_formatter.get_target_width()` → `level_formatter.target_width()`
time: 2026-03-07T20:04:00.000000000-08:00
